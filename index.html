<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <style>
        /* CSS 디자인 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: #f7f7f8; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px;
            background: #202123;
            color: white;
            text-align: center;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
        }

        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .user .bubble { background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .ai .bubble { background: #e9e9eb; color: #333; border-bottom-left-radius: 4px; }

        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        button {
            background: #10a37f; /* ChatGPT 스타일 초록색 */
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled { background: #ccc; cursor: not-allowed; }

        /* 로딩 애니메이션 */
        .loading { font-size: 12px; color: #888; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">AI Chat Assistant</header>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message ai">
                <div class="bubble">안녕하세요! 질문을 입력해 주세요.</div>
            </div>
        </div>

        <div id="loading" class="loading" style="padding: 0 20px;">AI가 생각 중...</div>

        <form class="chat-input-area" id="chat-form">
            <input type="text" id="user-input" placeholder="메시지를 입력하세요..." autocomplete="off">
            <button type="submit" id="send-btn">전송</button>
        </form>
    </div>

    <script>
        // --- 설정 영역 ---
        const API_KEY = 'YOUR_OPENAI_API_KEY'; // 여기에 발급받은 OpenAI API 키를 입력하세요.
        const API_URL = 'https://api.openai.com/v1/chat/completions';

        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');
        const loadingText = document.getElementById('loading');
        const sendBtn = document.getElementById('send-btn');

        // 메시지 화면 추가 함수
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // OpenAI API 호출 함수
        async function fetchAIResponse(userMessage) {
            loadingText.style.display = 'block';
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo', // 또는 'gpt-4'
                        messages: [{ role: 'user', content: userMessage }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    return data.choices[0].message.content;
                } else {
                    throw new Error('API 응답 오류');
                }
            } catch (error) {
                console.error(error);
                return "죄송합니다. 오류가 발생했습니다. API 키를 확인해 주세요.";
            } finally {
                loadingText.style.display = 'none';
                sendBtn.disabled = false;
            }
        }

        // 폼 제출 이벤트
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            
            if (!message) return;

            // 1. 사용자 메시지 표시
            addMessage(message, 'user');
            userInput.value = '';

            // 2. API 호출 및 AI 응답 표시
            const aiResponse = await fetchAIResponse(message);
            addMessage(aiResponse, 'ai');
        });
    </script>
</body>
</html>
